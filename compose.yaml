services:
  mailbridge:
    build: .
    restart: unless-stopped
    ports:
      - "${MAILBRIDGE_BIND:-127.0.0.1:18082}:8080"
    environment:
      MAILBRIDGE_DATA_DIR: /data
      MAILBRIDGE_DATABASE_PATH: /data/mailbridge.db
      MAILBRIDGE_MASTER_KEY_FILE: /data/master.key
      MAILBRIDGE_SESSION_SECRET_FILE: /data/session.key
      MAILBRIDGE_PUBLIC_URL: ${MAILBRIDGE_PUBLIC_URL:-http://127.0.0.1:18082}
      MAILBRIDGE_ALLOWED_HOSTS: ${MAILBRIDGE_ALLOWED_HOSTS:-127.0.0.1,127.0.0.1:8080,127.0.0.1:18082,localhost,localhost:8080,localhost:18082}
      MAILBRIDGE_ALLOWED_ORIGINS: ${MAILBRIDGE_ALLOWED_ORIGINS:-http://127.0.0.1:18082,http://localhost:18082}
      MAILBRIDGE_SECURE_COOKIES: ${MAILBRIDGE_SECURE_COOKIES:-false}
      MAILBRIDGE_AUTO_SYNC_INTERVAL_SECONDS: ${MAILBRIDGE_AUTO_SYNC_INTERVAL_SECONDS:-300}
      MAILBRIDGE_AUTO_SYNC_LIMIT: ${MAILBRIDGE_AUTO_SYNC_LIMIT:-50}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
