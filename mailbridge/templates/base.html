<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mailbridge MCP</title>
    <style>
      :root { color-scheme: light dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; background: #f7f7f4; color: #202124; }
      header { background: #263238; color: #fff; padding: 18px 28px; }
      main { max-width: 1180px; margin: 0 auto; padding: 24px; }
      h1, h2, h3 { margin: 0 0 14px; line-height: 1.2; }
      section { margin-bottom: 28px; }
      table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; }
      th, td { padding: 10px; border-bottom: 1px solid #e6e6e6; text-align: left; vertical-align: top; }
      th { background: #eceff1; font-size: 13px; text-transform: uppercase; }
      input, select, textarea { width: 100%; box-sizing: border-box; padding: 9px; border: 1px solid #b7b7b7; border-radius: 4px; background: #fff; color: #202124; }
      label { display: block; font-size: 13px; font-weight: 650; margin-bottom: 4px; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
      .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
      .panel { background: #fff; border: 1px solid #ddd; padding: 16px; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      button, .button { display: inline-flex; align-items: center; justify-content: center; min-height: 36px; padding: 0 12px; border: 1px solid #607d8b; border-radius: 4px; background: #455a64; color: #fff; text-decoration: none; cursor: pointer; }
      button.secondary, .button.secondary { background: #fff; color: #263238; }
      button.danger { border-color: #8a1f11; background: #b3261e; }
      .notice { padding: 10px 12px; background: #fff8e1; border: 1px solid #f2ca52; margin-bottom: 18px; }
      .muted { color: #5f6368; font-size: 13px; }
      .checkboxes label { display: inline-flex; gap: 6px; align-items: center; margin-right: 12px; }
      .checkboxes input { width: auto; }
      code { background: #eceff1; padding: 2px 5px; border-radius: 3px; }
      @media (max-width: 760px) { .grid, .grid-3 { grid-template-columns: 1fr; } main { padding: 16px; } }
    </style>
  </head>
  <body>
    <header>
      <h1>Mailbridge MCP</h1>
      <div>Account administration and policy surface for Codex mail automation</div>
      {% if user %}
        <nav style="margin-top: 10px;" class="actions">
          <a class="button secondary" href="/">Accounts</a>
          {% if user.is_admin %}<a class="button secondary" href="/admin">Admin</a>{% endif %}
          <form method="post" action="/logout"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button class="secondary">Logout {{ user.username }}</button></form>
        </nav>
      {% endif %}
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
